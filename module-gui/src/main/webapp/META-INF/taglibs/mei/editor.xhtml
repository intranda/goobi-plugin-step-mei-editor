<!-- MEI Editor with CodeMirror and Verovio side by side -->
<ui:composition
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:mei="http://goobi.io/mei"
	>
    <!-- MEI Editor Container -->
    <div class="editor editor-mei" data-editor-id="meiEditor" data-editor="mei">
        <h:inputTextarea
            id="meiInput"
            value="#{content}"
            styleClass="visually-hidden"
            />
        <!-- CodeMirror Editor Panel -->
        <div class="editor-panel mei-code-panel">
            <div class="panel-header">
                <h6>MEI Code Editor</h6>
            </div>
            <div class="panel-body">
                <div class="editor">
                    <div class="editor-menubar">
                        <div class="editor-menu-group">
                            <button
                                type="button"
                                id="FormatButton"
                                class="btn"
                                aria-label="Format XML"
                                title="Format XML"
                                data-bs-toggle="tooltip">
                                <span class="fa fa-code" aria-hidden="true"></span>
                            </button>
                            <button
                                type="button"
                                id="ValidateButton"
                                class="btn"
                                aria-label="Validate XML"
                                title="Validate XML"
                                data-bs-toggle="tooltip">
                                <span class="fa fa-check" aria-hidden="true"></span>
                            </button>
                        </div>
                        <div class="editor-menu-group">
                            <button
                                type="button"
                                id="UpdateButton"
                                class="btn"
                                aria-label="Update Notation"
                                title="Update Notation"
                                data-bs-toggle="tooltip"
                                data-command="refresh"
                                >
                                <span class="fa fa-refresh" aria-hidden="true"></span>
                            </button>
                            <label class="form-check-label">
                                <input type="checkbox" id="AutoUpdateCheckbox" class="form-check-input" checked="true"/>
                                Auto-update notation
                            </label>
                        </div>
                    </div>
                    <div class="codemirror"></div>
                </div>
            </div>
        </div>

        <!-- Verovio Notation Panel -->
        <div class="editor-panel mei-notation-panel">
            <div class="panel-header">
                <h6>Music Notation</h6>
            </div>
            <div class="panel-body">
                <mei:verovio
                    content="#{content}" />
            </div>
        </div>
    </div>
    <!-- Include MEI Editor JavaScript -->
    <h:outputScript name="js/mei-editor.js" library="MEIEditor" target="head" />
    <h:outputStylesheet name="css/mei-editor.min.css" library="MEIEditor"  />
</ui:composition>
