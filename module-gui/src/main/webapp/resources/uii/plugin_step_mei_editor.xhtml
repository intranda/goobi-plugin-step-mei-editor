<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:o="http://omnifaces.org/ui"
    xmlns:of="http://omnifaces.org/functions"
    template="/uii/template/template.html"
    xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:button="http://goobi.io/button"
    xmlns:section="http://goobi.io/section"
	xmlns:mei="http://goobi.io/mei"
    >
    <ui:param name="myPageTitle" value="#{msgs.plugin}: #{msgs[('plugin_').concat(AktuelleSchritteForm.myPlugin.title)]}" />

	<ui:define name="breadcrumb">
        <intranda:breadcrumb label="#{msgs.startseite}" action="index" navId="a0" />
        <c:if test="#{LoginForm.hasRole('Workflow_Processes') and NavigationForm.uiStatus.pluginSimulation == true}">
			<intranda:breadcrumb id="processAll" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.aktuelleProzesse:msgs.prozessvorlagen}" action="process_all" navId="a1" />
			<intranda:breadcrumb id="processEdit" label="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.prozessDetails:msgs.process_templateDetails}" action="process_edit" />
		</c:if>
        <c:if test="#{NavigationForm.uiStatus.pluginSimulation != true}">
		    <intranda:breadcrumb label="#{msgs.aktuelleSchritte}" action="#{AktuelleSchritteForm.paginator.returnToPreviousPage}" />
    	   	<intranda:breadcrumb label="#{AktuelleSchritteForm.mySchritt.prozess.titel}" action="#{AktuelleSchritteForm.myPlugin.cancel}" />
		</c:if>
        <intranda:breadcrumb label="#{myPageTitle}" noSeparator="#{true}" />
    </ui:define>

    <ui:define name="info">
    </ui:define>

    <ui:define name="content">
        <h:form>
            <section:section type="action">
                <section:header
                    icon="puzzle-piece"
                    title="#{msgs.plugin}: #{msgs[('plugin_').concat(AktuelleSchritteForm.myPlugin.title)]}">
                    <div class="actions d-flex">
                        <button
                            jsf:id="id10"
                            class="btn d-flex align-items-center btn--title-action"
                            jsf:rel="tooltip"
                            jsf:action="#{NavigationForm.Reload}"
                            title="#{msgs.reload}"
                            rel="tooltip"
                            data-bs-toggle="tooltip">
                            <span
                                aria-hidden="true"
                                class="fa fa-refresh" />
                        </button>
                        <button
                            jsf:rendered="#{NavigationForm.uiStatus.pluginSimulation != true and AktuelleSchritteForm.myPlugin.allowTaskFinishButtons == true}"
                            title="#{msgs.task_leavePluginAndFinishTask}"
                            jsf:id="id11"
                            class="btn d-flex align-items-center btn--title-action"
                            jsf:rel="tooltip"
                            jsf:action="#{AktuelleSchritteForm.SchrittDurchBenutzerAbschliessen}"
                            rel="tooltip"
                            data-bs-toggle="tooltip">
                            <span
                                aria-hidden="true"
                                class="fa fa-check" />
                            <f:setPropertyActionListener target="#{NavigationForm.uiStatus.pluginSimulation}" value="#{false}" />
                        </button>
                        <button
                            jsf:id="id12"
                            class="btn d-flex align-items-center btn--title-action"
                            jsf:rel="tooltip"
                            jsf:action="#{AktuelleSchritteForm.myPlugin.cancel}"
                            jsf:rendered="#{NavigationForm.uiStatus.pluginSimulation != true and AktuelleSchritteForm.myPlugin.allowTaskFinishButtons == true}"
                            title="#{msgs.pluginLeave}"
                            data-bs-toggle="tooltip"
                            rel="tooltip">
                            <span
                                aria-hidden="true"
                                class="fa fa-close" />
                            <f:setPropertyActionListener target="#{NavigationForm.uiStatus.pluginSimulation}" value="#{false}" />
                        </button>
                    </div>
                </section:header>
                <section:body padding="true">
                    <div class="row">
                        <div class="col">
                            <!-- View Mode Toggle -->
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="btn-group" role="group">
                                    <button
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.setViewMode('image')}"
                                        class="btn btn-#{AktuelleSchritteForm.myPlugin.imageView ? 'primary' : 'outline-primary'}"
                                        >
                                        <f:ajax render="@form" />
                                        <span class="fa fa-picture-o" />
                                    </button>
                                    <button
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.setViewMode('thumbnail')}"
                                        class="btn btn-#{AktuelleSchritteForm.myPlugin.thumbnailView ? 'primary' : 'outline-primary'}"
                                        >
                                        <f:ajax render="@form" />
                                        <span class="fa fa-th" />
                                    </button>
                                </div>
                            </div>

                            <!-- IMAGE VIEW MODE -->
                            <h:panelGroup rendered="#{AktuelleSchritteForm.myPlugin.imageView}">
                                <!-- Main Image Display -->
                                <div class="text-center mb-3" style="min-height: 400px; background-color: #f8f9fa;">
                                    <h:panelGroup rendered="#{AktuelleSchritteForm.myPlugin.currentImage != null}">
                                        <canvas
                                            class="thumb-canvas"
                                            data-image_small="#{AktuelleSchritteForm.myPlugin.currentImage.largeThumbnailUrl}"
                                            data-image_large="#{AktuelleSchritteForm.myPlugin.currentImage.largeThumbnailUrl}"
                                            title="#{AktuelleSchritteForm.myPlugin.currentImage.imageName}"
                                            id="mainImage"></canvas>
                                        <div class="mt-2">
                                            <small class="text-muted">#{AktuelleSchritteForm.myPlugin.currentImage.imageName}</small>
                                        </div>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{AktuelleSchritteForm.myPlugin.currentImage == null}">
                                        <div class="alert alert-info mt-5">#{msgs.noImagesFound}</div>
                                    </h:panelGroup>
                                </div>
                                <!-- Enhanced Paginator -->
                                <div class="dataTables__paginator">
                                    <!-- First -->
                                     <button
                                        class="btn btn-blank"
                                        aria-label="#{msgs.firstPage}"
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.firstImage}"
                                        jsf:id="navfirst">
                                        <span class="fa fa-angle-double-left"/>
                                        <f:ajax render="@form"/>
                                        <c:if test="#{AktuelleSchritteForm.myPlugin.currentImageIndex == 0}">
                                            <f:passThroughAttribute name="disabled" value="true" />
                                        </c:if>
                                    </button>

                                    <!-- Previous -->
                                    <button
                                        class="btn btn-primary-400"
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.previousImage}"
                                        jsf:id="navprev">
                                        <span class="fa fa-angle-left"/>
                                        <h:outputText value=" #{msgs.previousImage}"/>
                                        <f:ajax render="@form"/>
                                        <c:if test="#{AktuelleSchritteForm.myPlugin.currentImageIndex == 0}">
                                            <f:passThroughAttribute name="disabled" value="true" />
                                        </c:if>
                                    </button>

                                    <!-- Page info and jump -->
                                     <div class="dataTables__paginator__page-count">
                                        <button
                                            type="button"
                                            class="btn btn-link text-black"
                                            id="txtMoveTo1"
                                            onclick="document.querySelector('[id$=txtMoveTo2]').style.display='inline';
                                                document.querySelector('[id$=txtMoveTo1]').style.display='none';
                                                document.querySelector('[id$=txtMoveTo2]').focus();
                                                document.querySelector('[id$=txtMoveTo2]').select();">
                                            #{msgs.seite} #{AktuelleSchritteForm.myPlugin.pageJumpInput} #{msgs.von} #{AktuelleSchritteForm.myPlugin.imageCount}
                                        </button>

                                        <h:inputText
                                            id="txtMoveTo2"
                                            forceId="false"
                                            value="#{AktuelleSchritteForm.myPlugin.pageJumpInput}"
                                            style="display:none;width:30px"
                                            required="true"
                                            onblur="document.querySelector('[id$=txtMoveTo2]').style.display='none';document.querySelector('[id$=txtMoveTo1]').style.display='inline';"
                                            onkeypress="return submitEnter(document.querySelector('[id$=cmdMoveTo]').id,event)" />
                                        <h:commandButton
                                            action="#{AktuelleSchritteForm.myPlugin.jumpToPage}"
                                            id="cmdMoveTo"
                                            forceId="false"
                                            value="go"
                                            style="display:none" >
                                        </h:commandButton>
                                    </div>

                                    <!-- Next -->
                                    <button
                                        class="btn btn-primary-400"
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.nextImage}"
                                        jsf:id="navnext">
                                        <h:outputText value="#{msgs.nextImage} "/>
                                        <span class="fa fa-angle-right" />
                                        <f:ajax render="@form" />
                                        <c:if test="#{AktuelleSchritteForm.myPlugin.currentImageIndex >= AktuelleSchritteForm.myPlugin.imageCount - 1}">
                                            <f:passThroughAttribute name="disabled" value="true" />
                                        </c:if>
                                    </button>

                                    <!-- Last -->
                                    <button
                                        class="btn btn-blank"
                                        aria-label="#{msgs.lastImage}"
                                        jsf:action="#{AktuelleSchritteForm.myPlugin.lastImage}"
                                        jsf:id="navlast">
                                        <span class="fa fa-angle-double-right" />
                                        <f:ajax render="@form" />
                                        <c:if test="#{AktuelleSchritteForm.myPlugin.currentImageIndex >= AktuelleSchritteForm.myPlugin.imageCount - 1}">
                                            <f:passThroughAttribute name="disabled" value="true" />
                                        </c:if>
                                    </button>
                                </div>
                            </h:panelGroup>

                            <!-- THUMBNAIL VIEW MODE -->
                            <h:panelGroup rendered="#{AktuelleSchritteForm.myPlugin.thumbnailView}">
                                <div class="thumbnail-gallery" style="max-height: 600px; overflow-y: auto;">
                                    <div class="row g-3">
                                        <ui:repeat value="#{AktuelleSchritteForm.myPlugin.imageList}" var="image" varStatus="status">
                                            <div class="col-6 col-md-4 col-lg-3">
                                                <h:commandLink action="#{AktuelleSchritteForm.myPlugin.selectImage(status.index)}"
                                                                styleClass="d-block thumbnail-link">
                                                    <div class="thumbnail-wrapper #{AktuelleSchritteForm.myPlugin.currentImageIndex == status.index ? 'active' : ''}">
                                                        <canvas
                                                            class="thumb-canvas"
                                                            data-image_small="#{image.largeThumbnailUrl}"
                                                            data-image_large="#{image.largeThumbnailUrl}"
                                                            title="#{image.tooltip}"
                                                            id="thumb_full_#{status.index}"
                                                            style="width: 100%; height: auto;"></canvas>
                                                        <div class="mt-1 text-center">
                                                            <small class="d-block text-truncate fw-bold">
                                                                #{status.index + 1}
                                                            </small>
                                                            <small class="d-block text-truncate text-muted" style="font-size: 0.65rem;">
                                                                #{image.imageName}
                                                            </small>
                                                        </div>
                                                    </div>
                                                </h:commandLink>
                                            </div>
                                        </ui:repeat>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </div>
                        <div class="col">
                            <p class="text-muted">MEI Editor here</p>
                        </div>
                    </div>
                </section:body>
                <section:footer>
                    <button:row>
                        <!-- Save -->
                        <button
                            jsf:id="absenden"
                            class="btn btn-blank"
                            jsf:action="#{AktuelleSchritteForm.myPlugin.cancel}">
                            <span
                                aria-hidden="true"
                                class="fa fa-save" />
                            <span>
                                <h:outputText value="#{msgs.speichern}" />
                            </span>
                            <f:setPropertyActionListener target="#{NavigationForm.uiStatus.pluginSimulation}" value="#{false}" />
                        </button>
                        <button
                            class="btn btn-success"
                            jsf:id="finishAndClose"
                            type="submit"
                            jsf:rendered="#{NavigationForm.uiStatus.pluginSimulation != true and AktuelleSchritteForm.myPlugin.allowTaskFinishButtons == true}"
                            jsf:action="#{AktuelleSchritteForm.SchrittDurchBenutzerAbschliessen}">
                            <span
                                aria-hidden="true"
                                class="fa fa-check" />
                            <span>
                                <h:outputText value="#{msgs.task_leavePluginAndFinishTask}" />
                            </span>
                            <f:setPropertyActionListener target="#{NavigationForm.uiStatus.pluginSimulation}" value="#{false}" />
                        </button>
                    </button:row>
                </section:footer>
            </section:section>
        </h:form>

                <script>
					faces.ajax
						.addOnEvent(function(
								data) {
							switch (data.status) {
							case 'success':
								loadImages();
								break;
							}
						})
				</script>
    </ui:define>

</ui:composition>
